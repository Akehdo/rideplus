server:
  port: 8080

spring:
  application:
    name: gateway-service

  cloud:
    gateway:
      routes:
        - id: identity-service
          uri: http://identity-service:8081
          predicates:
            - Path=/auth/**

        - id: passengers-service
          uri: http://passengers-service:8082
          predicates:
            - Path=/passengers/**

jwt:
  access-secret: access-secret-access-secret-123456
  access-expiration: 3600