server:
  port: 8080

spring:
  application:
    name: gateway-service

  cloud:
    gateway:
      routes:
        - id: identity-service
          uri: http://identity-service:8081
          predicates:
            - Path=/auth/**

jwt:
  access-secret: access-secret-access-secret-123456
  access-expiration: 3600

management:
  endpoints:
    web:
      exposure:
        include: prometheus