services:
  frontend:
    image: rideplus/frontend:local
    ports:
      - "8088:80"
    deploy:
      replicas: 2
      restart_policy:
        condition: any

  identity-db-primary:
    image: postgres:16
    environment:
      POSTGRES_DB: identity
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - identity-primary-data:/var/lib/postgresql/data
      - ./postgres/identity-primary/init:/docker-entrypoint-initdb.d:ro
      - ./postgres/identity-primary/postgresql.conf:/etc/postgresql/postgresql.conf:ro
      - ./postgres/identity-primary/pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
    command:
      - postgres
      - -c
      - config_file=/etc/postgresql/postgresql.conf
      - -c
      - hba_file=/etc/postgresql/pg_hba.conf
    deploy:
      replicas: 1
      restart_policy:
        condition: any

  identity-db-replica:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      PGDATA: /var/lib/postgresql/data
    ports:
      - "5435:5432"
    volumes:
      - identity-replica-data:/var/lib/postgresql/data
      - ./postgres/identity-replica/replica-entrypoint.sh:/replica-entrypoint.sh:ro
    entrypoint: ["sh", "/replica-entrypoint.sh"]
    deploy:
      replicas: 1
      restart_policy:
        condition: any

  passengers-db:
    image: postgres:16
    environment:
      POSTGRES_DB: passengers
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - passengers-data:/var/lib/postgresql/data
    deploy:
      replicas: 1
      restart_policy:
        condition: any

  identity-service:
    image: rideplus/identity-service:local
    ports:
      - "8081:8081"
    environment:
      SPRING_PROFILES_ACTIVE: seed
      SPRING_DATASOURCE_URL: jdbc:postgresql://identity-db-primary:5432/identity
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
    deploy:
      replicas: 1
      restart_policy:
        condition: any

  passengers-service:
    image: rideplus/passenger-service:local
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://passengers-db:5432/passengers
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
    deploy:
      replicas: 1
      restart_policy:
        condition: any

  gateway-service:
    image: rideplus/gateway-service:local
    ports:
      - "8080:8080"
    deploy:
      replicas: 2
      restart_policy:
        condition: any

  prometheus:
    image: prom/prometheus:latest
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --web.enable-remote-write-receiver
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus:/etc/prometheus:ro
    deploy:
      replicas: 1
      restart_policy:
        condition: any

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
    deploy:
      replicas: 1
      restart_policy:
        condition: any

  node-exporter:
    image: prom/node-exporter:latest
    ports:
      - "9100:9100"
    deploy:
      mode: global

volumes:
  grafana-data:
  identity-primary-data:
  identity-replica-data:
  passengers-data:
